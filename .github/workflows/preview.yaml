name: preview

on:
  workflow_run:
    workflows: ["build"]
    types:
      - requested
      - completed

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # leave it at this version or pnpm gets messed up
      - uses: ./.github/actions/setup-pnpm

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts-${{ github.event.workflow_run.id }}
          path: ./dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find PR number
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const response = await github.rest.search.issuesAndPullRequests({
              q: 'repo:${{ github.repository }} is:pr sha:${{ github.event.workflow_run.head_sha }}',
              per_page: 1,
            })
            const items = response.data.items
            if (items.length < 1) {
              console.error('No PRs found')
              return
            }
            const pullRequestNumber = items[0].number
            console.info("Pull request number is", pullRequestNumber)
            return pullRequestNumber

      # deploy
      - name: Deploy to Cloudflare Pages
        id: cloudflare-publish
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          command: pages deploy dist --project-name=connect --branch=${{ steps.pr.outputs.result }}

      - name: Comment URL on PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            <!-- _(run_id **${{ github.run_id }}**)_ -->
            Welcome to connect! Make sure to:
            * read the [contributing guidelines](https://github.com/commaai/connect?tab=readme-ov-file#contributing)
            * mark your PR as a draft until it's ready to review
            * post the preview on [Discord](https://discord.comma.ai); feedback from users will speedup the PR review

            deployed preview: https://${{ steps.pr.outputs.result }}.connect-d5y.pages.dev
          comment-tag: run_id
          pr-number: ${{ steps.pr.outputs.result }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  preview-master:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # leave it at this version or pnpm gets messed up
      - uses: ./.github/actions/setup-pnpm

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts-${{ github.event.workflow_run.id }}
          path: ./dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        id: cloudflare-publish
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          command: pages deploy dist --project-name=connect --branch=latest

      # show master preview as a clickable entry in the "preview" environment
      - name: Record deployment
        uses: actions/github-script@v9
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ github.event.workflow_run.head_sha }}',
              environment: 'preview',
              required_contexts: [],
              auto_merge: false,
              production_environment: false,
              description: 'Cloudflare Pages (master preview)',
            })
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'preview',
              environment_url: '${{ steps.cloudflare-publish.outputs.deployment-url }}',
            })
