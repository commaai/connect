name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm

      - run: |
          pnpm install
          cd ./node_modules/puppeteer
          pnpm install

      - run: pnpm run build:development

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Run end-to-end tests
        run: pnpm test-puppeteer-build

      - name: Check WebRTC latency test configuration
        id: webrtc-latency
        run: |
          if [ -n "$WEBRTC_LATENCY_DONGLE_ID" ] && [ -n "$WEBRTC_LATENCY_ACCESS_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          WEBRTC_LATENCY_DONGLE_ID: ${{ secrets.WEBRTC_LATENCY_DONGLE_ID }}
          WEBRTC_LATENCY_ACCESS_TOKEN: ${{ secrets.WEBRTC_LATENCY_ACCESS_TOKEN }}

      - name: Run WebRTC latency test
        if: ${{ steps.webrtc-latency.outputs.enabled == 'true' }}
        run: pnpm test-webrtc-latency-build
        env:
          WEBRTC_LATENCY_DONGLE_ID: ${{ secrets.WEBRTC_LATENCY_DONGLE_ID }}
          WEBRTC_LATENCY_ACCESS_TOKEN: ${{ secrets.WEBRTC_LATENCY_ACCESS_TOKEN }}
          WEBRTC_LATENCY_REPORT_PATH: artifacts/webrtc-latency/report.html
          WEBRTC_LATENCY_MIN_SUCCESS_RATE: ${{ vars.WEBRTC_LATENCY_MIN_SUCCESS_RATE }}
          WEBRTC_LATENCY_MAX_CONNECT_AVG_MS: ${{ vars.WEBRTC_LATENCY_MAX_CONNECT_AVG_MS }}
          WEBRTC_LATENCY_MAX_TOTAL_AVG_MS: ${{ vars.WEBRTC_LATENCY_MAX_TOTAL_AVG_MS }}
          WEBRTC_LATENCY_ATTEMPT_DEADLINE_MS: ${{ vars.WEBRTC_LATENCY_ATTEMPT_DEADLINE_MS }}
          WEBRTC_LATENCY_TIMEOUT_MS: ${{ vars.WEBRTC_LATENCY_TIMEOUT_MS }}

      - name: Upload WebRTC latency report
        if: ${{ always() && steps.webrtc-latency.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-latency-report
          path: artifacts/webrtc-latency/report.html
          if-no-files-found: warn

  # bundle_size:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v3
  #     - uses: ./.github/actions/setup-pnpm
  #     - uses: preactjs/compressed-size-action@v2
  #       with:
  #         repo-token: ${{ secrets.GITHUB_TOKEN }}
  #         build-script: build:production
  #         pattern: "./dist/assets/*.{css,js}"
  #         strip-hash: "\\b-\\w{8}"
  #         minimum-change-threshold: 100

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm

      - run: pnpm install
      - run: pnpm build:production

      - name: run Lighthouse CI
        run: |
          pnpm add -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/master' && github.repository == 'commaai/connect'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - id: buildx
        uses: docker/setup-buildx-action@v2

      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/commaai/connect
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr,prefix=
            type=sha,format=long,prefix=
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: get date
        run: echo "GIT_TIMESTAMP=$(git show -s --format=%cI)" >> $GITHUB_ENV

      - uses: docker/build-push-action@v5
        with:
          build-args: |
            VITE_APP_GIT_SHA=${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}
            VITE_APP_GIT_TIMESTAMP=${{ env.GIT_TIMESTAMP }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_RELEASE=${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
